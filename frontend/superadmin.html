<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - All in One Invoicing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0f19;
            color: #e2e8f0;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120, 119, 198, 0.12), transparent);
        }
        .admin-header {
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .admin-header .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .admin-header .brand-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #7877c6, #00f0ff);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            color: #0b0f19;
        }
        .admin-header h1 { font-size: 1rem; font-weight: 700; }
        .admin-header .badge {
            background: rgba(120, 119, 198, 0.2);
            color: #7877c6;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .admin-header .user-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .admin-header .user-area span { font-size: 0.85rem; color: #94a3b8; }
        .btn-logout {
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
        }
        .btn-logout:hover { background: rgba(239, 68, 68, 0.2); }
        .admin-body { max-width: 1200px; margin: 0 auto; padding: 40px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(12px);
        }
        .stat-card .stat-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            margin-bottom: 8px;
        }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card .stat-sub {
            font-size: 0.8rem;
            color: #475569;
            margin-top: 4px;
        }
        .stat-card.accent { border-left: 3px solid #00f0ff; }
        .stat-card.success { border-left: 3px solid #39ff14; }
        .stat-card.warning { border-left: 3px solid #fcd34d; }
        .stat-card.danger { border-left: 3px solid #ef4444; }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .search-box {
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #f8fafc;
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            width: 280px;
            transition: all 0.2s;
        }
        .search-box:focus { border-color: #00f0ff; }
        .search-box::placeholder { color: #475569; }
        .clients-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            overflow: hidden;
        }
        .clients-table thead th {
            padding: 14px 20px;
            text-align: left;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.02);
        }
        .clients-table tbody td {
            padding: 16px 20px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .clients-table tbody tr:hover { background: rgba(255,255,255,0.03); }
        .client-name {
            font-weight: 600;
            color: #f8fafc;
        }
        .client-email {
            color: #64748b;
            font-size: 0.8rem;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .status-active {
            background: rgba(57, 255, 20, 0.1);
            color: #39ff14;
        }
        .status-disabled {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
        }
        .status-onboarded {
            background: rgba(0, 240, 255, 0.1);
            color: #00f0ff;
        }
        .status-pending {
            background: rgba(252, 211, 77, 0.1);
            color: #fcd34d;
        }
        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            margin-right: 4px;
        }
        .action-btn:hover { background: rgba(255,255,255,0.05); color: #f8fafc; }
        .action-btn.danger { color: #fca5a5; border-color: rgba(239, 68, 68, 0.3); }
        .action-btn.danger:hover { background: rgba(239, 68, 68, 0.1); }
        .action-btn.toggle { color: #fcd34d; border-color: rgba(252, 211, 77, 0.3); }
        .action-btn.toggle:hover { background: rgba(252, 211, 77, 0.1); }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #475569;
        }
        .empty-state h3 { color: #64748b; margin-bottom: 8px; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 24px;
        }
        .modal .close-btn {
            float: right;
            background: none;
            border: none;
            color: #64748b;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .detail-item label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            margin-bottom: 4px;
        }
        .detail-item span {
            font-size: 0.9rem;
            color: #f8fafc;
        }
        .invoices-mini-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        .invoices-mini-table th {
            padding: 8px 12px;
            text-align: left;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .invoices-mini-table td {
            padding: 10px 12px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .admin-body { padding: 20px; }
            .detail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <div class="brand">
            <div class="brand-icon">A</div>
            <h1>All in One Invoicing</h1>
            <span class="badge">Super Admin</span>
        </div>
        <div class="user-area">
            <span id="admin-name">Admin</span>
            <button class="btn-logout" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <div class="admin-body">
        <div class="stats-grid">
            <div class="stat-card accent">
                <div class="stat-label">Total Clients</div>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card success">
                <div class="stat-label">Active Clients</div>
                <div class="stat-value" id="stat-active">0</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-label">Total Invoices</div>
                <div class="stat-value" id="stat-invoices">0</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-label">Outstanding</div>
                <div class="stat-value" id="stat-outstanding">$0</div>
            </div>
        </div>

        <div class="section-header">
            <h2>All Clients</h2>
            <input type="text" class="search-box" placeholder="Search clients..." oninput="filterClients(this.value)">
        </div>

        <table class="clients-table">
            <thead>
                <tr>
                    <th>Client</th>
                    <th>Status</th>
                    <th>Onboarding</th>
                    <th>Invoices</th>
                    <th>Outstanding</th>
                    <th>Joined</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="clients-tbody">
                <tr><td colspan="7" class="empty-state"><h3>Loading...</h3></td></tr>
            </tbody>
        </table>
    </div>

    <!-- Client Detail Modal -->
    <div class="modal-overlay" id="client-modal">
        <div class="modal">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2 id="modal-client-name">Client Details</h2>
            <div class="detail-grid" id="modal-details"></div>
            <h3 style="margin-top:24px;font-size:0.9rem;color:#94a3b8;">Invoices</h3>
            <table class="invoices-mini-table">
                <thead><tr><th>Number</th><th>Status</th><th>Amount</th><th>Date</th></tr></thead>
                <tbody id="modal-invoices"></tbody>
            </table>
        </div>
    </div>

    <script>
        var allClients = [];

        async function checkAuth() {
            try {
                var res = await fetch('/api/superadmin/me');
                if (!res.ok) throw new Error();
                var data = await res.json();
                document.getElementById('admin-name').textContent = data.username;
            } catch (e) {
                window.location.href = '/superadmin-login.html';
            }
        }

        async function loadInsights() {
            try {
                var res = await fetch('/api/superadmin/insights');
                var data = await res.json();
                document.getElementById('stat-total').textContent = data.total_clients;
                document.getElementById('stat-active').textContent = data.active_clients;
                document.getElementById('stat-invoices').textContent = data.total_invoices;
                document.getElementById('stat-outstanding').textContent = '$' + data.total_outstanding.toLocaleString();
            } catch (e) { console.error(e); }
        }

        async function loadClients() {
            try {
                var res = await fetch('/api/superadmin/clients');
                allClients = await res.json();
                renderClients(allClients);
            } catch (e) {
                document.getElementById('clients-tbody').innerHTML = '<tr><td colspan="7" class="empty-state"><h3>Error loading clients</h3></td></tr>';
            }
        }

        function renderClients(clients) {
            var tbody = document.getElementById('clients-tbody');
            if (clients.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><h3>No clients yet</h3><p>Clients will appear here once they register.</p></td></tr>';
                return;
            }
            tbody.innerHTML = clients.map(function(c) {
                return '<tr>' +
                    '<td><div class="client-name">' + (c.company_name || c.contact_name || 'Unnamed') + '</div><div class="client-email">' + c.email + '</div></td>' +
                    '<td><span class="status-badge ' + (c.is_active ? 'status-active' : 'status-disabled') + '">' + (c.is_active ? 'Active' : 'Disabled') + '</span></td>' +
                    '<td><span class="status-badge ' + (c.is_onboarded ? 'status-onboarded' : 'status-pending') + '">' + (c.is_onboarded ? 'Complete' : 'Pending') + '</span></td>' +
                    '<td>' + c.invoice_count + '</td>' +
                    '<td>$' + (c.outstanding || 0).toLocaleString() + '</td>' +
                    '<td style="color:#64748b;font-size:0.8rem;">' + (c.created_at || '').substring(0, 10) + '</td>' +
                    '<td>' +
                        '<button class="action-btn" onclick="viewClient(' + c.id + ')">View</button>' +
                        '<button class="action-btn toggle" onclick="toggleClient(' + c.id + ')">' + (c.is_active ? 'Disable' : 'Enable') + '</button>' +
                        '<button class="action-btn danger" onclick="deleteClient(' + c.id + ')">Delete</button>' +
                    '</td>' +
                '</tr>';
            }).join('');
        }

        function filterClients(q) {
            if (!q) { renderClients(allClients); return; }
            q = q.toLowerCase();
            var filtered = allClients.filter(function(c) {
                return (c.company_name || '').toLowerCase().includes(q) ||
                       (c.email || '').toLowerCase().includes(q) ||
                       (c.contact_name || '').toLowerCase().includes(q);
            });
            renderClients(filtered);
        }

        async function viewClient(id) {
            try {
                var res = await fetch('/api/superadmin/clients/' + id);
                var client = await res.json();
                document.getElementById('modal-client-name').textContent = client.company_name || client.contact_name || 'Client';
                document.getElementById('modal-details').innerHTML =
                    '<div class="detail-item"><label>Email</label><span>' + client.email + '</span></div>' +
                    '<div class="detail-item"><label>Phone</label><span>' + (client.phone_number || '-') + '</span></div>' +
                    '<div class="detail-item"><label>Address</label><span>' + (client.address || '-') + '</span></div>' +
                    '<div class="detail-item"><label>ABN</label><span>' + (client.abn || '-') + '</span></div>' +
                    '<div class="detail-item"><label>Industry</label><span>' + (client.industry || '-') + '</span></div>' +
                    '<div class="detail-item"><label>Joined</label><span>' + client.created_at + '</span></div>' +
                    '<div class="detail-item"><label>Status</label><span>' + (client.is_active ? 'Active' : 'Disabled') + '</span></div>' +
                    '<div class="detail-item"><label>Onboarded</label><span>' + (client.is_onboarded ? 'Yes' : 'No') + '</span></div>';
                var invHtml = '';
                if (client.invoices && client.invoices.length > 0) {
                    client.invoices.forEach(function(inv) {
                        invHtml += '<tr><td>' + inv.number + '</td><td><span class="status-badge status-' + inv.status.toLowerCase().replace(/\s+/g, '-') + '">' + inv.status + '</span></td><td>$' + (inv.due || 0).toFixed(2) + '</td><td>' + (inv.date || '') + '</td></tr>';
                    });
                } else {
                    invHtml = '<tr><td colspan="4" style="text-align:center;color:#475569;padding:20px;">No invoices yet</td></tr>';
                }
                document.getElementById('modal-invoices').innerHTML = invHtml;
                document.getElementById('client-modal').classList.add('show');
            } catch (e) { alert('Error loading client'); }
        }

        function closeModal() {
            document.getElementById('client-modal').classList.remove('show');
        }

        async function toggleClient(id) {
            try {
                await fetch('/api/superadmin/clients/' + id + '/toggle', { method: 'PUT' });
                loadClients();
                loadInsights();
            } catch (e) { alert('Error'); }
        }

        async function deleteClient(id) {
            if (!confirm('Are you sure you want to delete this client and all their data?')) return;
            try {
                await fetch('/api/superadmin/clients/' + id, { method: 'DELETE' });
                loadClients();
                loadInsights();
            } catch (e) { alert('Error'); }
        }

        async function logout() {
            await fetch('/api/superadmin/logout', { method: 'POST' });
            window.location.href = '/superadmin-login.html';
        }

        checkAuth();
        loadInsights();
        loadClients();
    </script>
</body>
</html>
