<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Login - All in One Invoicing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0f19;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120, 119, 198, 0.15), transparent);
        }
        .auth-container { width: 100%; max-width: 400px; padding: 24px; }
        .auth-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 48px 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            text-align: center;
        }
        .brand { margin-bottom: 40px; }
        .brand-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #7877c6, #00f0ff);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 20px;
            font-weight: 800;
            color: #0b0f19;
        }
        .brand h1 { font-size: 1.3rem; font-weight: 700; color: #f8fafc; margin-bottom: 4px; }
        .brand p { font-size: 0.85rem; color: #94a3b8; }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .btn-google {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 14px; background: #fff; color: #333;
            border-radius: 10px; font-weight: 600; font-size: 0.95rem;
            text-decoration: none; transition: all 0.2s; border: 1px solid #e2e8f0;
            cursor: pointer; font-family: inherit;
        }
        .btn-google:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .link-home { margin-top: 24px; }
        .link-home a { color: #64748b; text-decoration: none; font-size: 0.8rem; }
        .link-home a:hover { color: #00f0ff; }
        .hint { margin-top: 20px; font-size: 0.78rem; color: #475569; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand">
                <div class="brand-icon">SA</div>
                <h1>Super Admin</h1>
                <p>All in One Invoicing Solutions</p>
            </div>
            <div class="error-msg" id="error-msg"></div>
            <a href="/api/auth/login?role=superadmin" class="btn-google">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Sign in with Google
            </a>
            <p class="hint">Only authorized Google accounts can access the admin panel.</p>
            <div class="link-home"><a href="/">← Back to home</a></div>
        </div>
    </div>
    <script>
        fetch('/api/superadmin/me').then(r => { if (r.ok) window.location.href = '/superadmin.html'; }).catch(() => {});
        var params = new URLSearchParams(window.location.search);
        if (params.get('error') === 'not_admin') {
            document.getElementById('error-msg').textContent = 'This Google account is not registered as a super admin.';
            document.getElementById('error-msg').style.display = 'block';
        }
    </script>
</body>
</html>
