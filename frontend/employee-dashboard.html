<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aniprotech - Employee Portal</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <style>
    :root { --primary: #4361ee; --bg-dark: #0f172a; }
    body { background: #f1f5f9; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    .topbar { background: var(--bg-dark); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .topbar .brand { font-size: 1.25rem; font-weight: 700; }
    .topbar .user-info { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; }
    .topbar .avatar { width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; }
    .nav-tabs-custom { background: #fff; border-bottom: 2px solid #e2e8f0; padding: 0 24px; display: flex; gap: 0; overflow-x: auto; }
    .nav-tab-item { padding: 14px 20px; cursor: pointer; font-weight: 500; color: #64748b; border-bottom: 3px solid transparent; white-space: nowrap; transition: all 0.2s; font-size: 0.9rem; }
    .nav-tab-item:hover { color: var(--primary); }
    .nav-tab-item.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .content { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .stat-card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; }
    .stat-card .label { font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .stat-card .value { font-size: 1.75rem; font-weight: 700; color: #1e293b; margin-top: 4px; }
    .clock-section { background: linear-gradient(135deg, #4361ee 0%, #3a56d4 100%); border-radius: 16px; padding: 32px; color: #fff; text-align: center; margin-bottom: 24px; }
    .clock-time { font-size: 3rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .clock-date { font-size: 0.95rem; opacity: 0.85; margin-bottom: 20px; }
    .clock-btn { padding: 14px 40px; border-radius: 12px; border: none; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; }
    .clock-btn-in { background: #10b981; color: #fff; }
    .clock-btn-in:hover { background: #059669; transform: scale(1.02); }
    .clock-btn-out { background: #ef4444; color: #fff; }
    .clock-btn-out:hover { background: #dc2626; transform: scale(1.02); }
    .clock-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .clock-status { margin-top: 16px; font-size: 0.95rem; opacity: 0.9; }
    .section-title { font-weight: 700; color: #1e293b; margin-bottom: 16px; font-size: 1.1rem; }
    .attendance-table th { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; font-weight: 600; background: #f8fafc; }
    .attendance-table td { font-size: 0.9rem; }
    .badge-type { font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
    .badge-office { background: #dbeafe; color: #1d4ed8; }
    .badge-remote { background: #d1fae5; color: #047857; }
    .badge-field { background: #fef3c7; color: #92400e; }
    .payslip-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .payslip-card:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(67,97,238,0.1); }
    .onboarding-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 8px; }
    .onboarding-item.completed { opacity: 0.6; }
    .onboarding-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #cbd5e1; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .onboarding-check.done { background: #10b981; border-color: #10b981; color: #fff; font-size: 0.7rem; }
    .progress-ring { width: 48px; height: 48px; }
    .empty-state { text-align: center; padding: 48px; color: #64748b; }
    .empty-state i { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><i class="bi bi-building"></i> aniprotech</div>
    <div class="user-info">
      <div id="userAvatar" class="avatar">?</div>
      <div>
        <div id="userName" style="font-weight:600;">Loading...</div>
        <div id="userRole" style="font-size:0.8rem; opacity:0.7;"></div>
      </div>
      <button class="btn btn-sm btn-outline-light ms-2" onclick="handleLogout()" title="Logout">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </div>

  <div class="nav-tabs-custom" id="navTabs">
    <div class="nav-tab-item active" data-tab="clock" onclick="switchTab('clock')">
      <i class="bi bi-clock-history"></i> Attendance
    </div>
    <div class="nav-tab-item" data-tab="history" onclick="switchTab('history')">
      <i class="bi bi-calendar3"></i> History
    </div>
    <div class="nav-tab-item" data-tab="payslips" onclick="switchTab('payslips')">
      <i class="bi bi-receipt"></i> Payslips
    </div>
    <div class="nav-tab-item" data-tab="onboarding" onclick="switchTab('onboarding')">
      <i class="bi bi-clipboard-check"></i> Onboarding
    </div>
  </div>

  <div class="content">
    <!-- ATTENDANCE TAB -->
    <div id="tab-clock">
      <div class="clock-section" id="clockSection">
        <div class="clock-time" id="liveTime">--:--:--</div>
        <div class="clock-date" id="liveDate"></div>
        <div class="location-status mb-3" id="locStatus" style="color:rgba(255,255,255,0.8); font-size:0.85rem;">
          <i class="bi bi-geo-alt"></i> Detecting location...
        </div>
        <button class="clock-btn clock-btn-in" id="clockInBtn" onclick="clockIn()">
          <i class="bi bi-box-arrow-in-right"></i> Clock In
        </button>
        <button class="clock-btn clock-btn-out d-none" id="clockOutBtn" onclick="clockOut()">
          <i class="bi bi-box-arrow-right"></i> Clock Out
        </button>
        <div class="clock-status" id="clockStatus"></div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-3">
          <div class="stat-card">
            <div class="label">Today's Hours</div>
            <div class="value" id="todayHours">0h 0m</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card">
            <div class="label">This Month</div>
            <div class="value" id="monthHours">0h</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card">
            <div class="label">Days Present</div>
            <div class="value" id="daysPresent">0</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card">
            <div class="label">Avg Hours/Day</div>
            <div class="value" id="avgHours">0h</div>
          </div>
        </div>
      </div>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" class="d-none">
      <h5 class="section-title"><i class="bi bi-calendar3"></i> Attendance History</h5>
      <div class="table-responsive">
        <table class="table attendance-table">
          <thead><tr><th>Date</th><th>Clock In</th><th>Clock Out</th><th>Hours</th><th>Type</th><th>Status</th></tr></thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </div>

    <!-- PAYSLIPS TAB -->
    <div id="tab-payslips" class="d-none">
      <h5 class="section-title"><i class="bi bi-receipt"></i> Payslips</h5>
      <div id="payslipList"></div>
    </div>

    <!-- ONBOARDING TAB -->
    <div id="tab-onboarding" class="d-none">
      <h5 class="section-title"><i class="bi bi-clipboard-check"></i> Onboarding Checklist</h5>
      <div class="mb-4">
        <div class="d-flex align-items-center gap-3 mb-3">
          <svg class="progress-ring" viewBox="0 0 48 48">
            <circle cx="24" cy="24" r="20" fill="none" stroke="#e2e8f0" stroke-width="4"/>
            <circle id="progressCircle" cx="24" cy="24" r="20" fill="none" stroke="#4361ee" stroke-width="4" stroke-dasharray="125.6" stroke-dashoffset="125.6" stroke-linecap="round" transform="rotate(-90 24 24)"/>
          </svg>
          <div>
            <div id="onboardingPercent" style="font-weight:700; font-size:1.25rem;">0%</div>
            <div style="color:#64748b; font-size:0.85rem;">Complete</div>
          </div>
        </div>
      </div>
      <div id="onboardingList"></div>
    </div>
  </div>

  <script>
    let empData = null;
    let isClockedIn = false;
    let currentLocation = { lat: 0, lng: 0, label: '' };

    // Start live clock
    function updateClock() {
      const now = new Date();
      document.getElementById('liveTime').textContent = now.toLocaleTimeString('en-US', { hour12: false });
      document.getElementById('liveDate').textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Get location
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          currentLocation.lat = pos.coords.latitude;
          currentLocation.lng = pos.coords.longitude;
          fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLocation.lat}&lon=${currentLocation.lng}`)
            .then(r => r.json()).then(d => { currentLocation.label = d.display_name || ''; });
          document.getElementById('locStatus').innerHTML = '<i class="bi bi-check-circle"></i> Location ready';
        },
        () => { document.getElementById('locStatus').innerHTML = '<i class="bi bi-exclamation-circle"></i> Location unavailable'; },
        { enableHighAccuracy: true }
      );
    }

    async function loadProfile() {
      try {
        const res = await fetch('/api/employee/auth/me');
        if (res.status === 401) { window.location.href = '/employee-login.html'; return; }
        empData = await res.json();
        document.getElementById('userName').textContent = empData.full_name;
        document.getElementById('userRole').textContent = empData.job_title || '';
        document.getElementById('userAvatar').textContent = empData.full_name.charAt(0).toUpperCase();
        isClockedIn = empData.today_clock_in && !empData.today_clock_out;
        updateClockUI();
        loadDashboard();
      } catch (e) { window.location.href = '/employee-login.html'; }
    }

    function updateClockUI() {
      const inBtn = document.getElementById('clockInBtn');
      const outBtn = document.getElementById('clockOutBtn');
      const status = document.getElementById('clockStatus');
      if (isClockedIn) {
        inBtn.classList.add('d-none');
        outBtn.classList.remove('d-none');
        status.innerHTML = `Clocked in at <strong>${empData.today_clock_in}</strong>`;
      } else {
        inBtn.classList.remove('d-none');
        outBtn.classList.add('d-none');
        if (empData.today_clock_in) {
          status.innerHTML = `Last clock in: <strong>${empData.today_clock_in}</strong> | Clocked out at <strong>${empData.today_clock_out || '--'}</strong>`;
        } else {
          status.textContent = 'Click "Clock In" to start your day';
        }
      }
      document.getElementById('todayHours').textContent = empData.today_hours ? `${Math.floor(empData.today_hours)}h ${Math.round((empData.today_hours % 1) * 60)}m` : '0h 0m';
    }

    async function clockIn() {
      const btn = document.getElementById('clockInBtn');
      btn.disabled = true;
      try {
        const res = await fetch('/api/employee/attendance/clock-in', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            latitude: currentLocation.lat,
            longitude: currentLocation.lng,
            location_label: currentLocation.label,
            device_info: navigator.userAgent,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Clock in failed');
        isClockedIn = true;
        await loadProfile();
      } catch (e) { alert(e.message); }
      btn.disabled = false;
    }

    async function clockOut() {
      const btn = document.getElementById('clockOutBtn');
      btn.disabled = true;
      try {
        const res = await fetch('/api/employee/attendance/clock-out', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Clock out failed');
        isClockedIn = false;
        await loadProfile();
      } catch (e) { alert(e.message); }
      btn.disabled = false;
    }

    async function loadDashboard() {
      try {
        const res = await fetch('/api/employee/dashboard');
        if (!res.ok) return;
        const data = await res.json();
        // Attendance summary
        document.getElementById('monthHours').textContent = `${data.attendance_summary.total_hours}h`;
        document.getElementById('daysPresent').textContent = data.attendance_summary.days_present;
        document.getElementById('avgHours').textContent = `${data.attendance_summary.avg_hours}h`;
        // History
        const histBody = document.getElementById('historyBody');
        histBody.innerHTML = data.attendance.map(r => `
          <tr>
            <td>${new Date(r.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</td>
            <td>${r.clock_in || '-'}</td>
            <td>${r.clock_out || '-'}</td>
            <td><strong>${r.total_hours || 0}h</strong></td>
            <td><span class="badge-type badge-${r.check_type || 'manual'}">${r.check_type || 'manual'}</span></td>
            <td><span class="badge bg-${r.status === 'completed' ? 'success' : 'primary'}">${r.status}</span></td>
          </tr>
        `).join('') || '<tr><td colspan="6" class="text-center text-muted py-4">No attendance records</td></tr>';
        // Payslips
        const payslipList = document.getElementById('payslipList');
        payslipList.innerHTML = data.payslips.map(p => `
          <div class="payslip-card">
            <div>
              <div style="font-weight:600;">${p.number}</div>
              <div style="color:#64748b; font-size:0.85rem;">${p.period_start} to ${p.period_end}</div>
            </div>
            <div class="text-end">
              <div style="font-weight:700; color:#1e293b;">$${parseFloat(p.net_pay || 0).toLocaleString()}</div>
              <span class="badge bg-${p.status === 'paid' ? 'success' : p.status === 'sent' ? 'primary' : 'secondary'}">${p.status}</span>
            </div>
          </div>
        `).join('') || '<div class="empty-state"><i class="bi bi-receipt"></i><p>No payslips yet</p></div>';
        // Onboarding
        const onbList = document.getElementById('onboardingList');
        const completed = data.onboarding.filter(o => o.is_completed).length;
        const total = data.onboarding.length;
        const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
        document.getElementById('onboardingPercent').textContent = `${pct}%`;
        const circumference = 2 * Math.PI * 20;
        document.getElementById('progressCircle').style.strokeDashoffset = circumference - (pct / 100) * circumference;
        onbList.innerHTML = data.onboarding.map(o => `
          <div class="onboarding-item ${o.is_completed ? 'completed' : ''}">
            <div class="onboarding-check ${o.is_completed ? 'done' : ''}">
              ${o.is_completed ? '<i class="bi bi-check"></i>' : ''}
            </div>
            <div>
              <div style="font-weight:${o.is_completed ? '400' : '600'};">${o.title}</div>
              <div style="font-size:0.8rem; color:#64748b;">${o.category || ''}</div>
            </div>
          </div>
        `).join('') || '<div class="empty-state"><i class="bi bi-clipboard"></i><p>No onboarding items</p></div>';
      } catch (e) {}
    }

    function switchTab(tab) {
      document.querySelectorAll('.nav-tab-item').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.querySelectorAll('[id^="tab-"]').forEach(p => p.classList.add('d-none'));
      document.getElementById(`tab-${tab}`).classList.remove('d-none');
    }

    async function handleLogout() {
      await fetch('/api/employee/auth/logout', { method: 'POST' });
      window.location.href = '/employee-login.html';
    }

    loadProfile();
  </script>
</body>
</html>
