<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aniprotech - Employee Login</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root { --primary: #4361ee; }
    body { background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
    .login-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 48px 40px; width: 100%; max-width: 420px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo img { height: 40px; }
    .login-logo h2 { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; margin-top: 8px; }
    .login-logo p { color: #6c757d; font-size: 0.875rem; }
    .form-label { font-weight: 600; color: #333; font-size: 0.875rem; }
    .form-control { border-radius: 10px; padding: 12px 16px; border: 1px solid #dee2e6; font-size: 0.95rem; }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67,97,238,0.15); }
    .btn-login { background: var(--primary); color: #fff; border: none; border-radius: 10px; padding: 12px; font-weight: 600; width: 100%; font-size: 1rem; }
    .btn-login:hover { background: #3a56d4; }
    .btn-login:disabled { opacity: 0.6; }
    .error-msg { display: none; color: #dc3545; font-size: 0.85rem; margin-top: 12px; text-align: center; background: #fff5f5; padding: 10px; border-radius: 8px; }
    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { color: #6c757d; text-decoration: none; font-size: 0.85rem; }
    .back-link a:hover { color: var(--primary); }
    .location-status { font-size: 0.8rem; color: #6c757d; margin-top: 8px; text-align: center; }
    .location-status i { color: var(--primary); }
    .spinner-border-sm { width: 1rem; height: 1rem; border-width: 0.15em; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <h2 style="color: var(--primary);">aniprotech</h2>
      <p>Employee Portal</p>
    </div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@company.com" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="position-relative">
          <input type="password" id="password" class="form-control pe-5" placeholder="Enter your password" required>
          <button type="button" class="btn position-absolute end-0 top-0 text-muted" onclick="togglePassword()" style="padding: 12px;">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <div id="locationStatus" class="location-status">
        <i class="bi bi-geo-alt"></i> Detecting your location...
      </div>
      <div id="errorMsg" class="error-msg"></div>
      <button type="submit" class="btn btn-login mt-3" id="loginBtn">
        <span id="btnText">Sign In</span>
        <span id="btnSpinner" class="d-none"><span class="spinner-border spinner-border-sm"></span></span>
      </button>
    </form>
    <div class="back-link">
      <a href="/"><i class="bi bi-arrow-left"></i> Back to aniprotech</a>
    </div>
  </div>

  <script>
    let userLocation = { lat: 0, lng: 0, label: '' };

    // Auto-detect location on load
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userLocation.lat = pos.coords.latitude;
          userLocation.lng = pos.coords.longitude;
          document.getElementById('locationStatus').innerHTML = '<i class="bi bi-check-circle-fill text-success"></i> Location detected';
          // Reverse geocode to get label
          fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLocation.lat}&lon=${userLocation.lng}`)
            .then(r => r.json())
            .then(data => {
              userLocation.label = data.display_name || '';
            })
            .catch(() => {});
        },
        (err) => {
          document.getElementById('locationStatus').innerHTML = '<i class="bi bi-exclamation-circle text-warning"></i> Location access denied';
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    } else {
      document.getElementById('locationStatus').innerHTML = '<i class="bi bi-exclamation-circle text-warning"></i> Geolocation not supported';
    }

    function togglePassword() {
      const inp = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (inp.type === 'password') { inp.type = 'text'; icon.className = 'bi bi-eye-slash'; }
      else { inp.type = 'password'; icon.className = 'bi bi-eye'; }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const txt = document.getElementById('btnText');
      const spinner = document.getElementById('btnSpinner');
      const err = document.getElementById('errorMsg');
      btn.disabled = true; txt.textContent = ''; spinner.classList.remove('d-none'); err.style.display = 'none';
      const deviceInfo = navigator.userAgent;
      try {
        const res = await fetch('/api/employee/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            latitude: userLocation.lat,
            longitude: userLocation.lng,
            location_label: userLocation.label,
            device_info: deviceInfo,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');
        window.location.href = '/employee-dashboard.html';
      } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
      } finally {
        btn.disabled = false; txt.textContent = 'Sign In'; spinner.classList.add('d-none');
      }
    }
  </script>
</body>
</html>
